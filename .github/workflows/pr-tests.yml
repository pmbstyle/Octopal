name: PR Tests

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Check Black formatting
        run: uv run black --check .

      - name: Check typed core
        run: uv run mypy

      - name: Run test suite
        run: uv run pytest

  webapp:
    name: Web dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install web dependencies
        working-directory: webapp
        run: npm ci

      - name: Audit web dependencies
        working-directory: webapp
        run: npm audit --audit-level=moderate

      - name: Build and test web dashboard
        working-directory: webapp
        run: npm run build && npm test

  desktop:
    name: Desktop build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Audit desktop dependencies
        working-directory: desktop
        run: npm audit --audit-level=moderate

      - name: Build desktop app
        working-directory: desktop
        run: npm run build

  whatsapp-bridge:
    name: WhatsApp bridge
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install bridge dependencies
        working-directory: scripts/whatsapp_bridge
        run: npm install --ignore-scripts

      - name: Audit bridge dependencies
        working-directory: scripts/whatsapp_bridge
        run: npm audit --audit-level=moderate

      - name: Check bridge syntax
        working-directory: scripts/whatsapp_bridge
        run: node --check bridge.mjs
